<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>SOCRAM TV</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SOCRAM TV">

<link rel="manifest" id="mf">

<style>
:root{
  --red:#e8192c;--rdk:#b5121f;--gold:#f5a623;
  --dk:#0a0a0f;--dk2:#111118;--dk3:#1a1a24;
  --tx:#e8e8f0;--mu:#7a7a9a;--br:rgba(255,255,255,.07);--cd:rgba(255,255,255,.04);
  --gn:#00c896;--bl:#4a9eff;--fav:#f5a623;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--dk);color:var(--tx);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden}

/* HEADER */
header{background:var(--dk2);border-bottom:2px solid var(--red);padding:0 14px;position:sticky;top:0;z-index:300;display:flex;align-items:center;justify-content:space-between;height:54px;box-shadow:0 4px 20px rgba(232,25,44,.28)}
.logo{display:flex;align-items:center;gap:9px}
.logo-i{width:36px;height:36px;border-radius:8px;overflow:hidden;flex-shrink:0;box-shadow:0 0 14px rgba(232,25,44,.5)}
.logo-i img{width:100%;height:100%;object-fit:cover;display:block}
.logo-t{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;line-height:1}
.logo-t span{color:var(--red)}
.live{display:flex;align-items:center;gap:5px;background:rgba(232,25,44,.14);border:1px solid var(--red);border-radius:4px;padding:3px 9px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--red)}
.dot{width:6px;height:6px;background:var(--red);border-radius:50%;animation:pu 1.2s infinite}
@keyframes pu{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.6)}}

/* LISTA */
.lb{background:linear-gradient(90deg,#0c0a18,#16122a);border-bottom:1px solid rgba(74,158,255,.2);padding:7px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.lb-lbl{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--mu);flex-shrink:0;letter-spacing:.5px}
.lb-btns{display:flex;gap:6px;flex:1}
.lb-btn{flex:1;padding:6px 10px;border-radius:7px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--br);background:var(--cd);color:var(--mu);transition:all .2s;text-align:center;white-space:nowrap}
.lb-btn.on{background:rgba(74,158,255,.18);border-color:rgba(74,158,255,.5);color:var(--bl)}
.lb-btn:hover:not(.on){border-color:var(--mu);color:var(--tx)}
.lb-cnt{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--mu);margin-left:auto;flex-shrink:0}
.lb-cnt b{color:var(--gn)}

/* DOWNLOADS — nuevo diseño */
.dlb{background:linear-gradient(90deg,#060e08,#0b1510);border-bottom:1px solid rgba(0,200,150,.18);padding:8px 14px;display:flex;flex-direction:column;gap:6px}
.dlb-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--mu);letter-spacing:1px;text-transform:uppercase}
.dlb-title strong{color:var(--gn)}
.dlb-bs{display:flex;gap:6px;flex-wrap:wrap}
.btn-dl{display:flex;align-items:center;gap:6px;background:rgba(0,200,150,.1);border:1px solid rgba(0,200,150,.28);border-radius:7px;padding:7px 13px;color:var(--gn);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;text-decoration:none;transition:all .2s;white-space:nowrap;flex:1;justify-content:center}
.btn-dl:hover{background:rgba(0,200,150,.2);border-color:var(--gn)}
.btn-dl span{font-size:14px}

/* INSTALL */
#ib{display:none;background:linear-gradient(135deg,#1c0a0e,#270f16);border-bottom:1px solid rgba(232,25,44,.3);padding:9px 14px;align-items:center;justify-content:space-between;gap:8px}
#ib.show{display:flex}
.ib-t{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--tx)}
.ib-t strong{color:var(--red)}
.ib-bs{display:flex;gap:6px}
#bInst{background:var(--red);border:none;border-radius:6px;padding:7px 12px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;cursor:pointer}
#bDis{background:none;border:1px solid var(--br);border-radius:6px;padding:7px 9px;color:var(--mu);font-size:11px;cursor:pointer}

/* STATS */
.stb{background:var(--dk3);border-bottom:1px solid var(--br);padding:6px 14px;display:flex;gap:14px;overflow-x:auto;scrollbar-width:none}
.stb::-webkit-scrollbar{display:none}
.sti{display:flex;align-items:center;gap:5px;flex-shrink:0;font-family:'Barlow Condensed',sans-serif;font-size:11px}
.stn{font-weight:700;color:var(--red)}
.stl{color:var(--mu)}

/* SEARCH */
.sw{background:var(--dk2);border-bottom:1px solid var(--br);padding:9px 14px}
.sbx{position:relative;display:flex;align-items:center}
.sic{position:absolute;left:11px;font-size:14px;color:var(--mu);pointer-events:none;z-index:1}
.sinp{width:100%;background:var(--dk3);border:1px solid var(--br);border-radius:8px;padding:9px 14px 9px 35px;color:var(--tx);font-family:'Barlow',sans-serif;font-size:14px;outline:none;transition:border-color .2s;-webkit-appearance:none}
.sinp:focus{border-color:var(--red)}
.sinp::placeholder{color:var(--mu)}

/* TABS */
.tw{background:var(--dk2);border-bottom:1px solid var(--br);overflow-x:auto;scrollbar-width:none;padding:0 14px;display:flex}
.tw::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:11px 12px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;color:var(--mu);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;text-transform:uppercase}
.tab:hover{color:var(--tx)}
.tab.on{color:var(--red);border-bottom-color:var(--red)}
.tab.fav-tab.on{color:var(--fav);border-bottom-color:var(--fav)}

/* MAIN */
.main{padding:14px 14px 34px;max-width:1400px;margin:0 auto}
.cah{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--br)}
.cai{font-size:18px;line-height:1}
.cat{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:2px}
.cac{margin-left:auto;font-size:11px;color:var(--mu);font-family:'Barlow Condensed',sans-serif}

/* CHANNEL GRID */
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px;animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* CHANNEL CARD */
.cc{background:var(--cd);border:1px solid var(--br);border-radius:10px;padding:11px;display:flex;align-items:center;gap:10px;transition:all .2s;position:relative;overflow:hidden}
.cc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--red);opacity:0;transition:opacity .2s}
.cc:hover{background:rgba(232,25,44,.07);border-color:rgba(232,25,44,.28);transform:translateX(2px)}
.cc:hover::before{opacity:1}
.cc.is-fav{border-color:rgba(245,166,35,.35)}
.cc.is-fav::before{opacity:1;background:var(--fav)}

.clw{width:48px;height:48px;flex-shrink:0;background:var(--dk3);border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid var(--br);position:relative}
.clg{width:40px;height:40px;object-fit:contain}
.clb{font-family:'Bebas Neue',sans-serif;font-size:10px;color:var(--red);display:flex;align-items:center;justify-content:center;width:100%;height:100%;text-align:center;padding:2px;line-height:1.2}
.csb{position:absolute;bottom:0;right:0;font-size:9px;background:rgba(0,0,0,.7);border-radius:3px 0 0 0;padding:1px 2px;line-height:1}

.ci{flex:1;min-width:0}
.cn{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:.4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.cm{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.cs{font-size:10px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;font-weight:600;padding:2px 5px;border-radius:3px;background:rgba(255,255,255,.06);color:var(--mu)}
.cq{font-size:10px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;font-weight:700;padding:2px 5px;border-radius:3px}
.qf{background:rgba(245,166,35,.15);color:var(--gold)}.qh{background:rgba(0,200,150,.12);color:var(--gn)}.q4{background:rgba(120,80,255,.15);color:#a78bfa}.qs{background:rgba(255,255,255,.06);color:var(--mu)}

/* CARD ACTIONS */
.ca{flex-shrink:0;display:flex;flex-direction:column;gap:4px;align-items:flex-end}
.ca-top{display:flex;gap:4px}
.bpl{background:var(--red);border:none;border-radius:6px;padding:7px 9px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;white-space:nowrap}
.bpl:hover{background:var(--rdk);transform:scale(1.04)}
.bfav{background:none;border:1px solid var(--br);border-radius:6px;padding:6px 7px;font-size:14px;cursor:pointer;transition:all .2s;line-height:1}
.bfav:hover{border-color:var(--fav);transform:scale(1.1)}
.bfav.on{background:rgba(245,166,35,.15);border-color:var(--fav)}
.bcp{background:var(--dk3);border:1px solid var(--br);border-radius:6px;padding:5px 7px;color:var(--mu);font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;cursor:pointer;transition:all .2s;width:100%}
.bcp:hover{color:var(--tx);border-color:var(--mu)}
.bcp.ok{color:var(--gn);border-color:var(--gn)}

/* FAVORITOS VACÍO */
.fav-empty{text-align:center;padding:50px 20px;color:var(--mu)}
.fav-empty-i{font-size:48px;margin-bottom:12px}
.fav-empty-t{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--tx);margin-bottom:8px}
.fav-empty-s{font-size:13px;line-height:1.6}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--mu)}
.empty-i{font-size:40px;margin-bottom:10px}
.empty-t{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;margin-bottom:6px;color:var(--tx)}

footer{padding:16px 14px;text-align:center;border-top:1px solid var(--br);color:var(--mu);font-size:11px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;line-height:1.9}
footer span{color:var(--red)}

/* MODAL */
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:600;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(6px)}
.mov.open{display:flex}
.mo{background:var(--dk2);border:1px solid var(--br);border-top:2px solid var(--red);border-radius:12px;padding:20px;max-width:440px;width:100%;animation:mi .2s ease;position:relative}
@keyframes mi{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
.mo-t{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;margin-bottom:12px;padding-right:24px;line-height:1.2}
.mo-l{background:var(--dk3);border:1px solid var(--br);border-radius:7px;padding:10px 12px;font-size:11px;color:var(--mu);font-family:monospace;word-break:break-all;margin-bottom:12px;user-select:all}
.mo-bs{display:flex;gap:7px;flex-wrap:wrap}
.mb{flex:1;min-width:100px;padding:9px 12px;border-radius:7px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;text-decoration:none;text-align:center;border:none;display:block;transition:all .2s}
.mbp{background:var(--red);color:#fff}.mbp:hover{background:var(--rdk)}
.mbs{background:var(--dk3);color:var(--tx);border:1px solid var(--br)}.mbs:hover{border-color:var(--mu)}
.mo-x{position:absolute;top:10px;right:12px;background:none;border:none;color:var(--mu);font-size:18px;cursor:pointer;padding:3px;line-height:1}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(18px);background:var(--dk3);border:1px solid var(--br);border-left:3px solid var(--gn);border-radius:8px;padding:9px 16px;font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:1px;color:var(--gn);opacity:0;transition:all .28s;z-index:9999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:580px){
  .cg{grid-template-columns:1fr}
  .main{padding:10px 10px 30px}
}
</style>
</head>

// FAVORITOS — persistidos en localStorage
// ═══════════════════════════════════════════════════
const FAV_KEY='socram_favs_v1';
let favs=new Set();

function loadFavs(){
  try{const d=localStorage.getItem(FAV_KEY);if(d)favs=new Set(JSON.parse(d));}catch(e){}
}
function saveFavs(){
  try{localStorage.setItem(FAV_KEY,JSON.stringify([...favs]));}catch(e){}
}
function toggleFav(id){
  if(favs.has(id)){favs.delete(id);showToast('⭐ Eliminado de favoritos');}
  else{favs.add(id);showToast('⭐ Añadido a favoritos');}
  saveFavs();
  // Actualizar botón y borde de la card visualmente
  const btn=document.getElementById('fav-'+id.slice(0,8));
  const card=document.getElementById('card-'+id.slice(0,8));
  if(btn){btn.classList.toggle('on',favs.has(id));btn.textContent=favs.has(id)?'★':'☆';}
  if(card){card.classList.toggle('is-fav',favs.has(id));}
  // Si estamos en favoritos, re-renderizar
  if(curGrp==='FAVORITOS') render();
}

// UI STATE
// ═══════════════════════════════════════════════════
const GI={'LA LIGA':'🇪🇸','LIGA DE CAMPEONES':'⭐','MOVISTAR DEPORTES':'📺','FORMULA 1':'🏎️','DAZN':'🎯','EUROSPORT':'🌍','FUTBOL INT':'🌐','HYPERMOTION':'⚡','COPA DEL REY':'🏆','MOTOR':'🏍️','DEPORTES':'🎽','TENNIS':'🎾','TDT':'📡','1RFEF':'⚽','MOVISTAR':'📱','FAVORITOS':'⭐'};
const TO=['TODOS','FAVORITOS','LA LIGA','LIGA DE CAMPEONES','MOVISTAR DEPORTES','FORMULA 1','DAZN','EUROSPORT','FUTBOL INT','HYPERMOTION','COPA DEL REY','MOTOR','DEPORTES','TENNIS','TDT','1RFEF','MOVISTAR'];
let curLista='newera', curGrp='TODOS', srch='', moUrl='';
const qc=q=>q==='FHD'?'qf':q==='HD'?'qh':q==='4K'?'q4':q==='SD'?'qs':'';

function buildStats(){
  const gs=new Set(DB[curLista].map(c=>c.g));
  document.getElementById('lbCnt').textContent=DB[curLista].length;
  document.getElementById('stb').innerHTML=
    `<div class="sti"><span class="stn">${DB[curLista].length}</span><span class="stl">CANALES</span></div>`+
    `<div class="sti"><span class="stn">${gs.size}</span><span class="stl">GRUPOS</span></div>`+
    `<div class="sti"><span class="stn">${DB[curLista].filter(c=>c.q==='FHD').length}</span><span class="stl">FHD</span></div>`+
    `<div class="sti"><span class="stn">${DB[curLista].filter(c=>c.q==='4K').length}</span><span class="stl">4K</span></div>`+
    `<div class="sti"><span class="stn">${favs.size}</span><span class="stl">FAVORITOS</span></div>`;
}

function buildTabs(){
  const used=new Set(DB[curLista].map(c=>c.g));
  const tabs=TO.filter(g=>g==='TODOS'||g==='FAVORITOS'||used.has(g));
  document.getElementById('tw').innerHTML=tabs.map(g=>{
    const ic=GI[g]||'📺';
    const lb=g==='LIGA DE CAMPEONES'?'CHAMPIONS':g==='MOVISTAR DEPORTES'?'M+ DEPORTES':g;
    const isFavTab=g==='FAVORITOS';
    return `<div class="tab${g===curGrp?' on':''}${isFavTab?' fav-tab':''}" onclick="sg('${g}')">${ic} ${lb}${isFavTab&&favs.size>0?` (${favs.size})`:''}</div>`;
  }).join('');
}

function sg(g){curGrp=g;srch='';document.getElementById('srch').value='';buildTabs();render();}

function setLista(k){
  if(curLista===k)return;
  curLista=k;
  document.getElementById('btnL1').classList.toggle('on',k==='newera');
  document.getElementById('btnL2').classList.toggle('on',k==='elcano');
  if(curGrp!=='FAVORITOS'){curGrp='TODOS';srch='';document.getElementById('srch').value='';}
  buildStats();buildTabs();render();
  showToast(`✓ ${k==='newera'?'Lista 1 · NEW ERA':'Lista 2 · EL CANO'} — ${DB[k].length} canales`);
}

function cardHTML(c){
  const bid='cp'+c.id.slice(0,8);
  const fid='fav-'+c.id.slice(0,8);
  const cid='card-'+c.id.slice(0,8);
  const isFav=favs.has(c.id);
  const sn=c.n.replace(/'/g,"\\'"),si=c.id.replace(/'/g,"\\'");
  const lg=c.lo?`<img class="clg" src="${c.lo}" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'"><div class="clb" style="display:none">${c.n.slice(0,5)}</div>`:`<div class="clb">${c.n.slice(0,5)}</div>`;
  return `<div class="cc${isFav?' is-fav':''}" id="${cid}">
    <div class="clw">${lg}<span class="csb">${c.i||'📺'}</span></div>
    <div class="ci">
      <div class="cn" title="${c.n}">${c.n}</div>
      <div class="cm"><span class="cs">${c.s}</span>${c.q?`<span class="cq ${qc(c.q)}">${c.q}</span>`:''}</div>
    </div>
    <div class="ca">
      <div class="ca-top">
        <button class="bpl" onclick="oMo('${sn}','${si}')">▶ ABRIR</button>
        <button class="bfav${isFav?' on':''}" id="${fid}" onclick="toggleFav('${si}')" title="${isFav?'Quitar de favoritos':'Añadir a favoritos'}">${isFav?'★':'☆'}</button>
      </div>
      <button class="bcp" id="${bid}" onclick="cpL('${si}','${bid}')">📋 COPIAR ENLACE</button>
    </div>
  </div>`;
}

function render(){
  const el=document.getElementById('main');

  // FAVORITOS
  if(curGrp==='FAVORITOS'){
    if(favs.size===0){
      el.innerHTML=`<div class="fav-empty">
        <div class="fav-empty-i">⭐</div>
        <div class="fav-empty-t">Sin favoritos aún</div>
        <div class="fav-empty-s">Pulsa <strong>☆</strong> en cualquier canal<br>para guardarlo aquí</div>
      </div>`;
      return;
    }
    // Busca en AMBAS listas para mostrar todos los favoritos
    const allChannels=[...DB.newera,...DB.elcano];
    const seen=new Set();
    const favChannels=[];
    allChannels.forEach(c=>{
      if(favs.has(c.id)&&!seen.has(c.id)){seen.add(c.id);favChannels.push(c);}
    });
    el.innerHTML=`<div class="cah"><span class="cai">⭐</span><div class="cat">FAVORITOS</div><div class="cac">${favChannels.length} guardados</div></div><div class="cg">${favChannels.map(cardHTML).join('')}</div>`;
    return;
  }

  const fil=DB[curLista].filter(c=>{
    const mg=curGrp==='TODOS'||c.g===curGrp;
    const q=srch.toLowerCase();
    return mg&&(!q||c.n.toLowerCase().includes(q)||c.g.toLowerCase().includes(q)||c.s.toLowerCase().includes(q));
  });
  if(!fil.length){el.innerHTML=`<div class="empty"><div class="empty-i">📭</div><div class="empty-t">Sin canales</div></div>`;return;}
  if(curGrp==='TODOS'&&!srch){
    const bg={};fil.forEach(c=>{if(!bg[c.g])bg[c.g]=[];bg[c.g].push(c);});
    const ord=TO.filter(g=>g!=='TODOS'&&g!=='FAVORITOS'&&bg[g]);
    Object.keys(bg).forEach(g=>{if(!ord.includes(g))ord.push(g);});
    el.innerHTML=ord.map(g=>`<div style="margin-bottom:20px"><div class="cah"><span class="cai">${GI[g]||'📺'}</span><div class="cat">${g}</div><div class="cac">${bg[g].length}</div></div><div class="cg">${bg[g].map(cardHTML).join('')}</div></div>`).join('');
  }else{
    const ic=curGrp!=='TODOS'?(GI[curGrp]||'📺'):'🔍';
    const t=curGrp==='TODOS'?'BÚSQUEDA':curGrp;
    el.innerHTML=`<div class="cah"><span class="cai">${ic}</span><div class="cat">${t}</div><div class="cac">${fil.length}</div></div><div class="cg">${fil.map(cardHTML).join('')}</div>`;
  }
}

// MODAL
function oMo(n,id){moUrl=`acestream://${id}`;document.getElementById('moT').textContent=n;document.getElementById('moL').textContent=moUrl;document.getElementById('moA').href=moUrl;document.getElementById('moC').textContent='📋 COPIAR';document.getElementById('mov').classList.add('open');}
function cMo(){document.getElementById('mov').classList.remove('open');}
function cpMo(){doCopy(moUrl,()=>{document.getElementById('moC').textContent='✓';setTimeout(()=>document.getElementById('moC').textContent='📋 COPIAR',2000);});}
function cpL(id,bid){doCopy(`acestream://${id}`,()=>{const b=document.getElementById(bid);if(b){const p=b.textContent;b.textContent='✓ Copiado';b.classList.add('ok');setTimeout(()=>{b.textContent=p;b.classList.remove('ok');},1500);}});}
function doCopy(t,cb){const ok=()=>{showToast('✓ Copiado');if(cb)cb();};navigator.clipboard?navigator.clipboard.writeText(t).then(ok).catch(()=>{fbC(t);ok();}):( fbC(t),ok());}
function fbC(t){const a=document.createElement('textarea');a.value=t;a.style.cssText='position:fixed;opacity:0;left:-9999px';document.body.appendChild(a);a.select();try{document.execCommand('copy');}catch(e){}document.body.removeChild(a);}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500);}

document.getElementById('srch').addEventListener('input',function(){srch=this.value.trim();if(srch){curGrp='TODOS';buildTabs();}render();});
document.getElementById('mov').addEventListener('click',e=>{if(e.target===document.getElementById('mov'))cMo();});

if('serviceWorker' in navigator){
  const sw=`const V='sv9';
self.addEventListener('install',e=>{e.waitUntil(self.skipWaiting())});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==V).map(k=>caches.delete(k)))).then(()=>self.clients.claim()))});
self.addEventListener('fetch',e=>{
  if(!e.request.url.startsWith('http')||e.request.method!=='GET')return;
  e.respondWith(fetch(e.request).then(r=>{if(r.ok&&e.request.destination==='document'){const c=r.clone();caches.open(V).then(ch=>ch.put(e.request,c))}return r}).catch(()=>caches.match(e.request)));
});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'})),{scope:'./'}).catch(()=>{});
}

let dp=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dp=e;document.getElementById('ib').classList.add('show');});
document.getElementById('bInst').addEventListener('click',()=>{
  if(dp){dp.prompt();dp.userChoice.then(()=>{dp=null;document.getElementById('ib').classList.remove('show');});}
  else alert('📲 Instalar SOCRAM TV:\n\nAndroid Chrome: menú ⋮ → Añadir a pantalla de inicio\niOS Safari: ⎙ compartir → En el inicio\nPC Chrome/Edge: ➕ en la barra de dirección');
});
document.getElementById('bDis').addEventListener('click',()=>{document.getElementById('ib').classList.remove('show');sessionStorage.setItem('ib_d','1');});
window.addEventListener('appinstalled',()=>{document.getElementById('ib').classList.remove('show');showToast('✓ SOCRAM TV instalada');});
if(!window.matchMedia('(display-mode:standalone)').matches&&!sessionStorage.getItem('ib_d'))
  setTimeout(()=>document.getElementById('ib').classList.add('show'),2000);
