<style>
:root{

  --dk:#0a0a0f;--dk2:#111118;--dk3:#1a1a24;--dk4:#22222e;

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--dk);color:var(--tx);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden;padding-bottom:env(safe-area-inset-bottom)}

/* HEADER */
header{background:var(--dk2);border-bottom:2px solid var(--red);padding:0 16px;position:sticky;top:0;z-index:300;display:flex;align-items:center;justify-content:space-between;height:56px;box-shadow:0 4px 20px rgba(232,25,44,.3)}
.logo{display:flex;align-items:center;gap:9px}
.logo-ico{width:36px;height:36px;background:var(--red);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:19px;box-shadow:0 0 16px rgba(232,25,44,.6);flex-shrink:0}
.logo-tx{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;line-height:1}
.logo-tx span{color:var(--red)}
.live-b{display:flex;align-items:center;gap:5px;background:rgba(232,25,44,.15);border:1px solid var(--red);border-radius:4px;padding:3px 9px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--red)}
.dot{width:6px;height:6px;background:var(--red);border-radius:50%;animation:p 1.2s infinite}
@keyframes p{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.65)}}

/* DOWNLOAD BAR */
.dl-bar{background:linear-gradient(90deg,#080f0a,#0e1810);border-bottom:1px solid rgba(0,200,150,.2);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.dl-txt{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--mu)}
.dl-txt strong{color:var(--gn)}
.dl-btns{display:flex;gap:6px;flex-wrap:wrap}
.btn-dl{display:flex;align-items:center;gap:5px;background:rgba(0,200,150,.1);border:1px solid rgba(0,200,150,.3);border-radius:7px;padding:6px 11px;color:var(--gn);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-decoration:none;transition:all .2s;white-space:nowrap}
.btn-dl:hover{background:rgba(0,200,150,.2);border-color:var(--gn)}

/* INSTALL BANNER */
#ib{display:none;background:linear-gradient(135deg,#1c0a0e,#270f16);border-bottom:1px solid rgba(232,25,44,.3);padding:10px 16px;align-items:center;justify-content:space-between;gap:8px}
#ib.show{display:flex}
.ib-t{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--tx);flex:1}
.ib-t strong{color:var(--red)}
.ib-bt{display:flex;gap:6px;flex-shrink:0}
#btnInst{background:var(--red);border:none;border-radius:7px;padding:8px 16px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:background .15s}
#btnInst:hover{background:var(--rdk)}
#btnDis{background:transparent;border:1px solid var(--br);border-radius:7px;padding:8px 10px;color:var(--mu);font-size:12px;cursor:pointer;transition:all .15s}
#btnDis:hover{color:var(--tx)}

/* STATS */
.sbar{background:var(--dk3);border-bottom:1px solid var(--br);padding:7px 16px;display:flex;gap:16px;overflow-x:auto;scrollbar-width:none}
.sbar::-webkit-scrollbar{display:none}
.si{display:flex;align-items:center;gap:5px;flex-shrink:0;font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:.5px}
.sn{font-weight:700;color:var(--red)}
.sl{color:var(--mu)}

/* SEARCH */
.sw{background:var(--dk2);border-bottom:1px solid var(--br);padding:10px 16px}
.sb{position:relative;display:flex;align-items:center}
.si2{position:absolute;left:11px;font-size:14px;color:var(--mu);pointer-events:none;z-index:1}
.sinp{width:100%;background:var(--dk3);border:1px solid var(--br);border-radius:8px;padding:9px 14px 9px 35px;color:var(--tx);font-family:'Barlow',sans-serif;font-size:14px;outline:none;transition:border-color .2s;-webkit-appearance:none}
.sinp:focus{border-color:var(--red)}
.sinp::placeholder{color:var(--mu)}

/* TABS */
.tw{background:var(--dk2);border-bottom:1px solid var(--br);overflow-x:auto;scrollbar-width:none;padding:0 16px;display:flex}
.tw::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:11px 13px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;color:var(--mu);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;text-transform:uppercase;user-select:none}
.tab:hover{color:var(--tx)}
.tab.active{color:var(--red);border-bottom-color:var(--red)}

/* MAIN */
.main{padding:14px 16px 30px;max-width:1400px;margin:0 auto}

/* CAT HEADER */
.ch{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--br)}
.chi{font-size:20px;line-height:1;flex-shrink:0}
.cht{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px}
.chc{margin-left:auto;font-size:11px;color:var(--mu);font-family:'Barlow Condensed',sans-serif}

/* CHANNEL GRID */
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:8px;animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* CHANNEL CARD */
.cc{background:var(--cd);border:1px solid var(--br);border-radius:10px;padding:12px;display:flex;align-items:center;gap:12px;transition:all .2s;position:relative;overflow:hidden}
.cc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--red);opacity:0;transition:opacity .2s}
.cc:hover{background:rgba(232,25,44,.07);border-color:rgba(232,25,44,.28);transform:translateX(2px)}
.cc:hover::before{opacity:1}
.clw{width:50px;height:50px;flex-shrink:0;background:var(--dk3);border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid var(--br);position:relative}
.clg{width:42px;height:42px;object-fit:contain}
.clb{font-family:'Bebas Neue',sans-serif;font-size:11px;color:var(--red);display:flex;align-items:center;justify-content:center;width:100%;height:100%;text-align:center;padding:2px}
.csb{position:absolute;bottom:0;right:0;font-size:9px;background:rgba(0,0,0,.6);border-radius:3px 0 0 0;padding:1px 2px;line-height:1}

.cs{font-size:10px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;font-weight:600;padding:2px 5px;border-radius:3px;background:rgba(255,255,255,.06);color:var(--mu)}

.qf{background:rgba(245,166,35,.15);color:var(--gold)}
.qh{background:rgba(0,200,150,.12);color:var(--gn)}
.q4{background:rgba(120,80,255,.15);color:#a78bfa}
.qs{background:rgba(255,255,255,.06);color:var(--mu)}
.ca{flex-shrink:0;display:flex;flex-direction:column;gap:4px}
.bpl{background:var(--red);border:none;border-radius:6px;padding:7px 10px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;white-space:nowrap}
.bpl:hover{background:var(--rdk);transform:scale(1.04)}
.bcp{background:var(--dk3);border:1px solid var(--br);border-radius:6px;padding:5px 8px;color:var(--mu);font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.5px;white-space:nowrap}
.bcp:hover{color:var(--tx);border-color:var(--mu)}
.bcp.ok{color:var(--gn);border-color:var(--gn)}

.mcomp{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--mu);text-transform:uppercase;margin:12px 0 7px;padding-left:6px;border-left:2px solid var(--red)}

.mc{background:var(--cd);border:1px solid var(--br);border-radius:10px;padding:12px 14px;margin-bottom:6px;transition:border-color .2s}

.tb{display:flex;align-items:center;gap:7px;flex:1;min-width:0}
.tb.r{flex-direction:row-reverse;text-align:right}
.tl{width:30px;height:30px;object-fit:contain;flex-shrink:0}
.tn{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mt{flex-shrink:0;text-align:center;min-width:54px}
.mh{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--red);line-height:1}
.mv{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:2px;color:var(--mu)}

/* CHANNEL LINKS IN MATCH */
.mc-chs{margin-top:10px;display:flex;flex-wrap:wrap;gap:5px;padding-top:8px;border-top:1px solid var(--br)}
.mc-ch-btn{display:inline-flex;align-items:center;gap:4px;border:none;border-radius:6px;padding:5px 10px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:all .2s;white-space:nowrap}
.mc-ch-ace{background:rgba(232,25,44,.18);color:var(--red);border:1px solid rgba(232,25,44,.35)}
.mc-ch-ace:hover{background:rgba(232,25,44,.32);transform:scale(1.03)}
.mc-ch-copy{background:rgba(74,158,255,.12);color:var(--bl);border:1px solid rgba(74,158,255,.3)}
.mc-ch-copy:hover{background:rgba(74,158,255,.22)}
.mc-ch-copy.ok{color:var(--gn);border-color:var(--gn);background:rgba(0,200,150,.1)}
.mc-ch-other{background:rgba(255,255,255,.05);color:var(--mu);border:1px solid var(--br);cursor:default}

/* UPDATE indicator */
.upd-bar{background:var(--dk3);border-bottom:1px solid var(--br);padding:5px 16px;font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--mu);display:flex;align-items:center;gap:8px;letter-spacing:.5px}
.upd-dot{width:5px;height:5px;background:var(--gn);border-radius:50%;animation:p 2s infinite}
#updTime{color:var(--gn)}

/* EMPTY */

.empty-i{font-size:44px;margin-bottom:10px}
.empty-t{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;margin-bottom:6px;color:var(--tx)}

footer span{color:var(--red)}

/* MODAL */
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:600;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(6px)}

.mo-bs{display:flex;gap:7px;flex-wrap:wrap}
.mb{flex:1;min-width:100px;padding:10px 14px;border-radius:7px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer;text-decoration:none;text-align:center;border:none;display:block;transition:all .2s}

.mbp:hover{background:var(--rdk)}
.mbs{background:var(--dk3);color:var(--tx);border:1px solid var(--br)}
.mbs:hover{border-color:var(--mu)}
.mo-x{position:absolute;top:11px;right:13px;background:none;border:none;color:var(--mu);font-size:19px;cursor:pointer;padding:3px;line-height:1}
.mo-x:hover{color:var(--tx)}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(18px);background:var(--dk3);border:1px solid var(--br);border-left:3px solid var(--gn);border-radius:8px;padding:9px 18px;font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:1px;color:var(--gn);opacity:0;transition:all .28s;z-index:9999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* LOADING */
.loading{text-align:center;padding:40px 20px;color:var(--mu);font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:1px}
.spin{display:inline-block;width:28px;height:28px;border:3px solid var(--br);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:580px){
  .cg{grid-template-columns:1fr}
  .main{padding:10px 10px 30px}
  .mc-ch-btn{font-size:10px;padding:4px 8px}
}
</style>

// Resolve TV channel name → acestream IDs
function resolveIds(chName){
  const k = chName.toLowerCase().trim();
  // exact match
  if(CH_MAP[k]) return CH_MAP[k];
  // partial match
  for(const [key,ids] of Object.entries(CH_MAP)){
    if(k.includes(key)||key.includes(k)) return ids;
  }
  return [];
}

// MATCHES — auto-updated via AI API
// ══════════════════════════════════════════════════════════
const STORAGE_KEY = 'socram_matches_v2';
const STORAGE_DATE = 'socram_matches_date';
let matchesData = null;

// Get today's date string
function todayStr(){
  return new Date().toISOString().slice(0,10);
}

// Load matches from localStorage cache or fetch fresh
async function loadMatches(){
  const cached = localStorage.getItem(STORAGE_KEY);
  const cachedDate = localStorage.getItem(STORAGE_DATE);
  const today = todayStr();
  if(cached && cachedDate === today){
    try{
      matchesData = JSON.parse(cached);
      document.getElementById('updTime').textContent = 'Hoy (caché)';
      return matchesData;
    }catch(e){}
  }
  return await refreshMatches();
}

async function refreshMatches(){
  document.getElementById('updTime').textContent = 'actualizando...';
  if(currentGroup==='PARTIDOS') renderLoading();
  try{
    const result = await fetchMatchesFromAI();
    if(result && result.length > 0){
      matchesData = result;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(matchesData));
      localStorage.setItem(STORAGE_DATE, todayStr());
      document.getElementById('updTime').textContent = new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
      buildStats();
      if(currentGroup==='PARTIDOS') renderMatches();
      return matchesData;
    }
  }catch(e){
    console.warn('Error cargando partidos:', e);
  }
  // Fallback a datos estáticos
  matchesData = FALLBACK_MATCHES;
  document.getElementById('updTime').textContent = 'datos fijos';
  buildStats();
  if(currentGroup==='PARTIDOS') renderMatches();
  return matchesData;
}

async function fetchMatchesFromAI(){
  const today = new Date().toLocaleDateString('es-ES',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const response = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:1000,
      system:`Eres un asistente que devuelve SOLO JSON válido, sin texto extra, sin markdown, sin \`\`\`.`,
      messages:[{
        role:"user",
        content:`Hoy es ${today}. Devuelve los partidos de fútbol de hoy en TV en España en este formato JSON exacto:
[{"comp":"nombre competición","matches":[{"h":"equipo local","a":"equipo visitante","time":"HH:MM","hL":"url escudo local sportstv-img.b-cdn.net","aL":"url escudo visitante","chs":["canal1","canal2"]}]}]

Competiciones: Liga EA Sports, Liga Hypermotion, Champions League, Europa League, Conference League, Premier League, Serie A, Bundesliga, Primera Federación.
Canales posibles: DAZN LaLiga, M+ LaLiga, DAZN, DAZN 1, DAZN 2, DAZN 3, M+ Liga de Campeones, M+ Liga de Campeones 2, M+ Liga de Campeones 3, M+ Vamos, Movistar Plus+, Gol Play, Teledeporte, La 1, La 2, LaLiga TV Hypermotion, LaLiga TV Hypermotion 2, Primera Federación.
Solo devuelve el JSON array, nada más.`
      }]
    })
  });
  if(!response.ok) throw new Error('API error '+response.status);
  const data = await response.json();
  const text = data.content.map(b=>b.text||'').join('').trim();
  const clean = text.replace(/```json|```/g,'').trim();
  return JSON.parse(clean);
}

// ── MATCH CARD with channel buttons ──
function matchHTML(m){
  // Build channel buttons: for each TV channel, show ACE buttons + copy
  let chBtns = '';
  let hasAce = false;
  (m.chs||[]).forEach(ch=>{
    const ids = resolveIds(ch);
    if(ids.length > 0){
      hasAce = true;
      const sn = (m.h+' - '+m.a).replace(/'/g,"\\'");
      // First ID = main open button, rest = copy options
      const bid = 'mc'+ids[0].slice(0,8);
      chBtns += `<button class="mc-ch-btn mc-ch-ace" onclick="openMo('${sn}','${ids[0]}')" title="${ch}">▶ ${ch}</button>`;
      if(ids.length > 1){
        chBtns += `<button class="mc-ch-btn mc-ch-copy" id="${bid}" onclick="cpMatchLinks(${JSON.stringify(ids)},'${bid}')" title="Copiar todos los enlaces de ${ch}">📋 ${ids.length} enlaces</button>`;
      } else {
        chBtns += `<button class="mc-ch-btn mc-ch-copy" id="${bid}" onclick="cpLink('${ids[0]}','${bid}')" title="Copiar enlace ${ch}">📋</button>`;
      }
    } else {
      chBtns += `<span class="mc-ch-btn mc-ch-other">${ch}</span>`;
    }
  });
  if(!hasAce && !chBtns){
    chBtns = `<span class="mc-ch-btn mc-ch-other" style="font-size:10px;color:var(--mu)">Sin enlace ACE</span>`;
  }
  return `<div class="mc">
    <div class="mc-top">
      <div class="tb"><img class="tl" src="${m.hL||''}" onerror="this.style.display='none'" loading="lazy"><span class="tn">${m.h}</span></div>
      <div class="mt"><div class="mh">${m.time}</div><div class="mv">VS</div></div>
      <div class="tb r"><img class="tl" src="${m.aL||''}" onerror="this.style.display='none'" loading="lazy"><span class="tn">${m.a}</span></div>
    </div>
    <div class="mc-chs">${chBtns}</div>
  </div>`;
}

function renderLoading(){
  document.getElementById('main').innerHTML=`<div class="loading"><div class="spin"></div><br>Cargando partidos...</div>`;
}

function renderMatches(){
  const data = matchesData || FALLBACK_MATCHES;
  const today = new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
  let html=`<div class="mday"><div class="mday-hd">📅 ${today.toUpperCase()}</div>`;
  data.forEach(comp=>{
    html+=`<div class="mcomp">${comp.comp}</div>`;
    (comp.matches||[]).forEach(m=>{html+=matchHTML(m);});
  });
  html+='</div>';
  document.getElementById('main').innerHTML=html;
}

function render(){
  if(grp==="PARTIDOS"){
    if(!matchesData) renderLoading();
    else renderMatches();
    return;
  }
  const el=document.getElementById('main');
  const fil=CH.filter(c=>{
    const mg=grp==="TODOS"||c.g===grp;
    const q=srch.toLowerCase();
    return mg&&(!q||c.n.toLowerCase().includes(q)||c.g.toLowerCase().includes(q)||c.s.toLowerCase().includes(q));
  });
  if(!fil.length){el.innerHTML=`<div class="empty"><div class="empty-i">📭</div><div class="empty-t">Sin resultados</div><p>No se encontraron canales.</p></div>`;return;}
  if(grp==="TODOS"&&!srch){
    const bg={};fil.forEach(c=>{if(!bg[c.g])bg[c.g]=[];bg[c.g].push(c);});
    const ord=TAB_ORDER.filter(g=>g!=="TODOS"&&g!=="PARTIDOS"&&bg[g]);
    el.innerHTML=ord.map(g=>{const m=TAB_META[g]||{i:"📺"};return`<div style="margin-bottom:24px"><div class="ch"><span class="chi">${m.i}</span><div class="cht">${g}</div><div class="chc">${bg[g].length} canales</div></div><div class="cg">${bg[g].map(cardHTML).join('')}</div></div>`;}).join('');
  }else{
    const m=grp!=="TODOS"?(TAB_META[grp]||{i:"📺"}):{i:"🔍"};
    const t=grp==="TODOS"?"BÚSQUEDA":grp;
    el.innerHTML=`<div class="ch"><span class="chi">${m.i}</span><div class="cht">${t}</div><div class="chc">${fil.length} canales</div></div><div class="cg">${fil.map(cardHTML).join('')}</div>`;
  }
}

// ── MODAL ──
function openMo(name,id){
  moUrl=`acestream://${id}`;
  document.getElementById('moT').textContent=name;
  document.getElementById('moL').textContent=moUrl;
  document.getElementById('moA').href=moUrl;
  document.getElementById('moC').textContent='📋 COPIAR';
  document.getElementById('mov').classList.add('open');
}
function closeMo(){document.getElementById('mov').classList.remove('open');}
function copyMo(){
  doCopy(moUrl,()=>{document.getElementById('moC').textContent='✓ COPIADO';setTimeout(()=>document.getElementById('moC').textContent='📋 COPIAR',2000);});
}

// ── COPY ──
function cpLink(id,bid){
  doCopy(`acestream://${id}`,()=>{
    const b=document.getElementById(bid);
    if(b){const p=b.textContent;b.textContent='✓';b.classList.add('ok');setTimeout(()=>{b.textContent=p;b.classList.remove('ok');},1500);}
  });
}

function cpMatchLinks(ids,bid){
  const links=ids.map(id=>`acestream://${id}`).join('\n');
  doCopy(links,()=>{
    const b=document.getElementById(bid);
    if(b){const p=b.textContent;b.textContent='✓ OK';b.classList.add('ok');setTimeout(()=>{b.textContent=p;b.classList.remove('ok');},1500);}
  });
}

function doCopy(text, cb){
  const done=()=>{showToast('✓ Copiado al portapapeles');if(cb)cb();};
  if(navigator.clipboard){navigator.clipboard.writeText(text).then(done).catch(()=>{fbCopy(text);done();});}
  else{fbCopy(text);done();}
}
function fbCopy(t){const a=document.createElement('textarea');a.value=t;a.style.cssText='position:fixed;opacity:0;left:-9999px';document.body.appendChild(a);a.select();try{document.execCommand('copy');}catch(e){}document.body.removeChild(a);}

function showToast(m){
  const t=document.getElementById('toast');
  t.textContent=m;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);
}

// ── SEARCH ──
document.getElementById('srch').addEventListener('input',function(){
  srch=this.value.trim();
  if(srch){grp="TODOS";buildTabs();}
  render();
});
document.getElementById('mov').addEventListener('click',e=>{if(e.target===document.getElementById('mov'))closeMo();});

// ── AUTO REFRESH ──
// Cada vez que se abre la pestaña PARTIDOS, verificar si los datos son del día
function checkDateRefresh(){
  const saved=localStorage.getItem(STORAGE_DATE);
  if(saved!==todayStr()){
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(STORAGE_DATE);
  }
}

// ── INIT ──
checkDateRefresh();
buildStats();
buildTabs();
render();
// Load matches async
loadMatches();

// 1. Manifest dinámico (no necesita archivo externo)
(function(){
  const manifest={
    name:"SOCRAM TV",short_name:"SOCRAM TV",
    description:"Canales Acestream deportivos y partidos del día",
    start_url:"./socram-tv.html",
    display:"standalone",
    background_color:"#0a0a0f",
    theme_color:"#e8192c",
    orientation:"any",
    icons:[{
      src:`data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='80' fill='%23e8192c'/><text x='256' y='330' font-size='280' text-anchor='middle' fill='white'>📺</text></svg>`,
      sizes:"512x512",type:"image/svg+xml",purpose:"any maskable"
    }]
  };
  const b=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
  const u=URL.createObjectURL(b);
  const l=document.createElement('link');
  l.rel='manifest';l.href=u;
  document.head.appendChild(l);
})();

// 2. Service Worker como blob (funciona sin servidor)
if('serviceWorker' in navigator){
  const sw=`
const V='socram-v4';
const S=['./socram-tv.html'];
self.addEventListener('install',e=>{
  e.waitUntil(caches.open(V).then(c=>{
    return Promise.allSettled(S.map(u=>c.add(u)));
  }).then(()=>self.skipWaiting()));
});
self.addEventListener('activate',e=>{
  e.waitUntil(
    caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==V).map(k=>caches.delete(k))))
    .then(()=>self.clients.claim())
  );
});
self.addEventListener('fetch',e=>{
  if(e.request.method!=='GET'||!e.request.url.startsWith('http'))return;
  e.respondWith(
    fetch(e.request).then(r=>{
      if(r&&r.ok){
        const cl=r.clone();
        caches.open(V).then(c=>c.put(e.request,cl));
      }
      return r;
    }).catch(()=>caches.match(e.request).then(r=>r||new Response('Sin conexión',{status:503})))
  );
});`;
  const blob=new Blob([sw],{type:'application/javascript'});
  const swUrl=URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl,{scope:'./'})
    .then(()=>console.log('SW registrado ✓'))
    .catch(e=>console.warn('SW:',e.message));
}

// 3. Install banner
let deferredPrompt=null;

window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  deferredPrompt=e;
  document.getElementById('ib').classList.add('show');
});

document.getElementById('btnInst').addEventListener('click',()=>{
  if(deferredPrompt){
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(r=>{
      deferredPrompt=null;
      document.getElementById('ib').classList.remove('show');
      if(r.outcome==='accepted') showToast('✓ SOCRAM TV instalada');
    });
  } else {
    // Manual instructions fallback
    const msg=`📲 CÓMO INSTALAR SOCRAM TV:\n\n` +
      `Android Chrome: menú (⋮) → "Añadir a pantalla de inicio"\n\n` +
      `iOS Safari: botón Compartir (□↑) → "En el pantalla de inicio"\n\n` +
      `PC Chrome/Edge: icono ➕ en la barra de dirección`;
    alert(msg);
  }
});

document.getElementById('btnDis').addEventListener('click',()=>{
  document.getElementById('ib').classList.remove('show');
  sessionStorage.setItem('ib_dismissed','1');
});

window.addEventListener('appinstalled',()=>{
  document.getElementById('ib').classList.remove('show');
  showToast('✓ SOCRAM TV instalada correctamente');
});

// Mostrar banner si no está en modo standalone y no fue descartado
if(!window.matchMedia('(display-mode: standalone)').matches && !sessionStorage.getItem('ib_dismissed')){
  setTimeout(()=>{
    if(!document.getElementById('ib').classList.contains('show'))
      document.getElementById('ib').classList.add('show');
  },1500);
}
