<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">

  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--dark);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden}

  header{background:var(--dark2);border-bottom:2px solid var(--red);padding:0 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;height:60px;box-shadow:0 4px 30px rgba(232,25,44,.2)}
  .logo{display:flex;align-items:center;gap:10px}
  .logo-icon{width:38px;height:38px;background:var(--red);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 20px rgba(232,25,44,.5)}
  .logo-text{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:#fff;line-height:1}
  .logo-text span{color:var(--red)}
  .live-badge{display:flex;align-items:center;gap:6px;background:rgba(232,25,44,.15);border:1px solid var(--red);border-radius:4px;padding:4px 10px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;color:var(--red)}
  .live-dot{width:7px;height:7px;background:var(--red);border-radius:50%;animation:pulse 1.2s infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

  #installBanner{display:none;background:linear-gradient(135deg,#1a0a0d,#2a0f14);border-bottom:1px solid rgba(232,25,44,.4);padding:10px 20px;align-items:center;gap:12px;justify-content:space-between}
  #installBanner.show{display:flex}
  .install-text{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--text)}
  .install-text strong{color:var(--red)}
  .install-actions{display:flex;gap:8px;flex-shrink:0}
  .btn-install{background:var(--red);border:none;border-radius:6px;padding:7px 14px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer}
  .btn-dismiss{background:transparent;border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text-muted);font-size:12px;cursor:pointer}

  .stats-bar{background:var(--dark3);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;gap:20px;overflow-x:auto;scrollbar-width:none}
  .stats-bar::-webkit-scrollbar{display:none}
  .stat-item{display:flex;align-items:center;gap:6px;flex-shrink:0;font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:.5px}
  .stat-num{font-weight:700;color:var(--red)}
  .stat-label{color:var(--text-muted)}

  .search-wrap{background:var(--dark2);border-bottom:1px solid var(--border);padding:12px 20px}
  .search-box{position:relative;display:flex;align-items:center}
  .search-icon{position:absolute;left:12px;color:var(--text-muted);pointer-events:none;font-size:15px;z-index:1}
  .search-input{width:100%;background:var(--dark3);border:1px solid var(--border);border-radius:8px;padding:10px 14px 10px 38px;color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
  .search-input:focus{border-color:var(--red)}
  .search-input::placeholder{color:var(--text-muted)}

  .tabs-wrap{background:var(--dark2);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;padding:0 20px;display:flex;gap:2px}
  .tabs-wrap::-webkit-scrollbar{display:none}
  .tab{flex-shrink:0;padding:12px 14px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;text-transform:uppercase}
  .tab:hover{color:var(--text)}
  .tab.active{color:var(--red);border-bottom-color:var(--red)}

  .content{padding:20px;max-width:1400px;margin:0 auto}
  .category-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
  .category-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--text)}
  .channel-count{margin-left:auto;font-size:12px;color:var(--text-muted);font-family:'Barlow Condensed',sans-serif}

  .channels-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;animation:fadeIn .3s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  .channel-card{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;align-items:center;gap:14px;transition:all .2s;position:relative;overflow:hidden}
  .channel-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--red);opacity:0;transition:opacity .2s}
  .channel-card:hover{background:rgba(232,25,44,.08);border-color:rgba(232,25,44,.3);transform:translateX(2px)}
  .channel-card:hover::before{opacity:1}

  .ch-logo-wrap{width:52px;height:52px;flex-shrink:0;background:var(--dark3);border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid var(--border)}
  .ch-logo{width:44px;height:44px;object-fit:contain}
  .ch-logo-fallback{font-family:'Bebas Neue',sans-serif;font-size:12px;color:var(--red);text-align:center;padding:2px;line-height:1.1;display:flex;align-items:center;justify-content:center;width:100%;height:100%}

  .ch-info{flex:1;min-width:0}
  .ch-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;color:var(--text);letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
  .ch-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .ch-source{font-size:10px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;font-weight:600;padding:2px 6px;border-radius:3px;background:rgba(255,255,255,.06);color:var(--text-muted)}
  .ch-quality{font-size:10px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;font-weight:700;padding:2px 6px;border-radius:3px}
  .q-fhd{background:rgba(245,166,35,.15);color:var(--gold)}
  .q-hd{background:rgba(0,200,150,.12);color:#00c896}
  .q-4k{background:rgba(120,80,255,.15);color:#a78bfa}
  .q-sd{background:rgba(255,255,255,.06);color:var(--text-muted)}

  .ch-action{flex-shrink:0;display:flex;flex-direction:column;gap:4px}
  .btn-play{background:var(--red);border:none;border-radius:6px;padding:8px 12px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s}

  .btn-copy{background:var(--dark3);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text-muted);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.5px}
  .btn-copy:hover{color:var(--text);border-color:var(--text-muted)}
  .btn-copy.copied{color:#00c896;border-color:#00c896}

  .empty{text-align:center;padding:60px 20px;color:var(--text-muted)}
  .empty-icon{font-size:48px;margin-bottom:12px}
  .empty-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;margin-bottom:6px;color:var(--text)}

  footer{margin-top:40px;padding:20px;text-align:center;border-top:1px solid var(--border);color:var(--text-muted);font-size:12px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px}

  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
  .modal-overlay.open{display:flex}
  .modal{background:var(--dark2);border:1px solid var(--border);border-top:2px solid var(--red);border-radius:12px;padding:24px;max-width:480px;width:100%;animation:modalIn .2s ease;position:relative}

  .modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;margin-bottom:16px;color:var(--text);padding-right:30px}
  .modal-link{background:var(--dark3);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:11px;color:var(--text-muted);font-family:monospace;word-break:break-all;margin-bottom:16px;user-select:all}
  .modal-buttons{display:flex;gap:8px;flex-wrap:wrap}
  .modal-btn{flex:1;min-width:120px;padding:10px 16px;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer;text-decoration:none;text-align:center;transition:all .2s;border:none;display:block}
  .modal-btn-primary{background:var(--red);color:#fff}
  .modal-btn-primary:hover{background:var(--red-dark)}
  .modal-btn-secondary{background:var(--dark3);color:var(--text);border:1px solid var(--border)}
  .modal-btn-secondary:hover{border-color:var(--text-muted)}
  .modal-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;padding:4px;line-height:1}
  .modal-close:hover{color:var(--text)}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark3);border:1px solid var(--border);border-left:3px solid #00c896;border-radius:8px;padding:10px 20px;font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:1px;color:#00c896;opacity:0;transition:all .3s;z-index:9999;pointer-events:none;white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:600px){.channels-grid{grid-template-columns:1fr}.content{padding:12px}.logo-text{font-size:22px}}

</head>

  {name:"PRIMERA FEDERACIÓN FHD",group:"1RFEF",logo:"https://static.wikia.nocookie.net/logopedia/images/d/df/Logo_Primera_RFEF_2021.png/revision/latest?cb=20230620215900&path-prefix=es",id:"a2ed6f2ca3f804481131c41ce64d4286a5820476",source:"NEW ERA",quality:"FHD"},

  {name:"MOVISTAR PLUS FHD",group:"MOVISTAR",logo:"https://i.ibb.co/hFYPWbpJ/plus.png",id:"b6ffbbc72a5b6b579faf79ebac229af7a25b933b",source:"NEW ERA",quality:"FHD"},
  {name:"MOVISTAR PLUS FHD",group:"MOVISTAR",logo:"https://i.ibb.co/hFYPWbpJ/plus.png",id:"c1b7f54af0de256d1ac0fcac4c130e62660089f4",source:"NEW ERA VI",quality:"FHD"},
  {name:"MOVISTAR PLUS FHD",group:"MOVISTAR",logo:"https://i.ibb.co/hFYPWbpJ/plus.png",id:"ed74406ccdb3c21941b919db6bffca7f1de015bb",source:"ELCANO",quality:"FHD"},

// TAB ORDER: LA LIGA va 1ª después de TODOS
const TAB_ORDER=["TODOS","LA LIGA","LIGA DE CAMPEONES","MOVISTAR DEPORTES","FORMULA 1","DAZN","EUROSPORT","FUTBOL INT","HYPERMOTION","COPA DEL REY","MOTOR","DEPORTES","TENNIS","TDT","1RFEF","MOVISTAR"];
const TAB_META={"TODOS":{icon:"🏆",label:"TODOS"},"LA LIGA":{icon:"🇪🇸",label:"LA LIGA"},"LIGA DE CAMPEONES":{icon:"⭐",label:"CHAMPIONS"},"MOVISTAR DEPORTES":{icon:"📺",label:"M+ DEPORTES"},"FORMULA 1":{icon:"🏎️",label:"F1"},"DAZN":{icon:"🎯",label:"DAZN"},"EUROSPORT":{icon:"🌍",label:"EUROSPORT"},"FUTBOL INT":{icon:"🌐",label:"FÚTBOL INT"},"HYPERMOTION":{icon:"⚡",label:"HYPERMOTION"},"COPA DEL REY":{icon:"🏆",label:"COPA REY"},"MOTOR":{icon:"🏍️",label:"MOTOR"},"DEPORTES":{icon:"🎽",label:"DEPORTES"},"TENNIS":{icon:"🎾",label:"TENIS"},"TDT":{icon:"📡",label:"TDT"},"1RFEF":{icon:"⚽",label:"1ª RFEF"},"MOVISTAR":{icon:"📱",label:"MOVISTAR"}};

let currentGroup="TODOS",searchQuery="",modalAceUrl="";

function qClass(q){return q==='FHD'?'q-fhd':q==='HD'?'q-hd':q==='4K'?'q-4k':q==='SD'?'q-sd':''}

function buildStats(){
  const bar=document.getElementById('statsBar');
  const grps=new Set(CHANNELS.map(c=>c.group));
  bar.innerHTML=`<div class="stat-item"><span class="stat-num">${CHANNELS.length}</span><span class="stat-label">CANALES</span></div><div class="stat-item"><span class="stat-num">${grps.size}</span><span class="stat-label">CATEGORÍAS</span></div><div class="stat-item"><span class="stat-num">${CHANNELS.filter(c=>c.quality==='FHD').length}</span><span class="stat-label">FHD</span></div><div class="stat-item"><span class="stat-num">${CHANNELS.filter(c=>c.quality==='4K').length}</span><span class="stat-label">4K</span></div>`;
}

function buildTabs(){
  const used=new Set(CHANNELS.map(c=>c.group));
  const tabs=TAB_ORDER.filter(g=>g==="TODOS"||used.has(g));
  document.getElementById('tabsWrap').innerHTML=tabs.map(g=>{
    const m=TAB_META[g]||{icon:"📺",label:g};
    return `<div class="tab${g===currentGroup?' active':''}" onclick="setGroup('${g}')">${m.icon} ${m.label}</div>`;
  }).join('');
}

function setGroup(g){currentGroup=g;searchQuery="";document.getElementById('searchInput').value="";buildTabs();renderChannels();}

function cardHTML(c){
  const short=c.id.slice(0,12).replace(/[^a-z0-9]/gi,'');
  const btnId=`copy-${short}`;
  const logoHTML=c.logo
    ?`<img class="ch-logo" src="${c.logo}" alt="${c.name}" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'"><div class="ch-logo-fallback" style="display:none">${c.name.slice(0,6)}</div>`
    :`<div class="ch-logo-fallback">${c.name.slice(0,6)}</div>`;
  const safeId=c.id.replace(/'/g,"\\'");
  const safeName=c.name.replace(/'/g,"\\'");
  return `<div class="channel-card">
    <div class="ch-logo-wrap">${logoHTML}</div>
    <div class="ch-info">
      <div class="ch-name" title="${c.name}">${c.name}</div>
      <div class="ch-meta"><span class="ch-source">${c.source}</span>${c.quality?`<span class="ch-quality ${qClass(c.quality)}">${c.quality}</span>`:''}</div>
    </div>
    <div class="ch-action">
      <button class="btn-play" onclick="openModal('${safeName}','${safeId}')">▶ ABRIR</button>
      <button class="btn-copy" id="${btnId}" onclick="copyLink('${safeId}','${btnId}')">📋 COPIAR</button>
    </div>
  </div>`;
}

function renderChannels(){
  const content=document.getElementById('mainContent');
  const filtered=CHANNELS.filter(c=>{
    const mg=currentGroup==="TODOS"||c.group===currentGroup;
    const q=searchQuery.toLowerCase();
    const ms=!q||c.name.toLowerCase().includes(q)||c.group.toLowerCase().includes(q)||c.source.toLowerCase().includes(q);
    return mg&&ms;
  });
  if(!filtered.length){content.innerHTML=`<div class="empty"><div class="empty-icon">📭</div><div class="empty-title">Sin resultados</div><p>No se encontraron canales.</p></div>`;return;}
  if(currentGroup==="TODOS"&&!searchQuery){
    const byGroup={};
    filtered.forEach(c=>{if(!byGroup[c.group])byGroup[c.group]=[];byGroup[c.group].push(c);});
    const ordered=TAB_ORDER.filter(g=>g!=="TODOS"&&byGroup[g]);
    content.innerHTML=ordered.map(group=>{
      const m=TAB_META[group]||{icon:"📺"};
      return `<div style="margin-bottom:28px"><div class="category-header"><span style="font-size:20px">${m.icon}</span><div class="category-title">${group}</div><div class="channel-count">${byGroup[group].length} canales</div></div><div class="channels-grid">${byGroup[group].map(cardHTML).join('')}</div></div>`;
    }).join('');
  }else{
    const m=currentGroup!=="TODOS"?(TAB_META[currentGroup]||{icon:"📺"}):{icon:"🔍"};
    const title=currentGroup==="TODOS"?"BÚSQUEDA":currentGroup;
    content.innerHTML=`<div class="category-header"><span style="font-size:20px">${m.icon}</span><div class="category-title">${title}</div><div class="channel-count">${filtered.length} canales</div></div><div class="channels-grid">${filtered.map(cardHTML).join('')}</div>`;
  }
}

// MODAL
function openModal(name,id){
  modalAceUrl=`acestream://${id}`;
  document.getElementById('modalTitle').textContent=name;
  document.getElementById('modalLink').textContent=modalAceUrl;
  document.getElementById('modalBtnAce').href=modalAceUrl;
  document.getElementById('modalBtnCopy').textContent='📋 COPIAR ENLACE';
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
function copyModalLink(){
  navigator.clipboard.writeText(modalAceUrl).then(()=>{
    const btn=document.getElementById('modalBtnCopy');
    btn.textContent='✓ COPIADO';
    showToast('✓ Enlace acestream copiado');
    setTimeout(()=>btn.textContent='📋 COPIAR ENLACE',2000);
  });
}

// COPY SINGLE LINK — solo el acestream://hash del canal
function copyLink(id,btnId){
  const url=`acestream://${id}`;
  const doIt=()=>{
    const btn=document.getElementById(btnId);
    if(btn){btn.textContent='✓';btn.classList.add('copied');setTimeout(()=>{btn.textContent='📋 COPIAR';btn.classList.remove('copied');},1500);}
    showToast('✓ Enlace acestream copiado');
  };
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(doIt).catch(()=>{fallbackCopy(url);doIt();});
  }else{fallbackCopy(url);doIt();}
}
function fallbackCopy(text){
  const ta=document.createElement('textarea');
  ta.value=text;ta.style.cssText='position:fixed;opacity:0';
  document.body.appendChild(ta);ta.select();
  document.execCommand('copy');document.body.removeChild(ta);
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);
}

document.getElementById('searchInput').addEventListener('input',function(){
  searchQuery=this.value.trim();
  if(searchQuery){currentGroup="TODOS";buildTabs();}
  renderChannels();
});
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

buildStats();buildTabs();renderChannels();

// ── PWA SERVICE WORKER (inline blob) ──
if('serviceWorker' in navigator){
  const SW=`
const CACHE='socram-tv-v2';
const FILES=['./'];
self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(FILES)).then(()=>self.skipWaiting()));});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))).then(()=>self.clients.claim()));});
self.addEventListener('fetch',e=>{
  if(e.request.method!=='GET'||e.request.url.startsWith('chrome-extension'))return;
  e.respondWith(fetch(e.request).then(r=>{if(r&&r.status===200){const cl=r.clone();caches.open(CACHE).then(c=>c.put(e.request,cl));}return r;}).catch(()=>caches.match(e.request)));
});
  `.trim();
  const blob=new Blob([SW],{type:'application/javascript'});
  const url=URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(()=>{});
}

// ── INSTALL BANNER ──
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  document.getElementById('installBanner').classList.add('show');
});
document.getElementById('btnInstall').addEventListener('click',()=>{
  if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('installBanner').classList.remove('show');});}
});
document.getElementById('btnDismiss').addEventListener('click',()=>document.getElementById('installBanner').classList.remove('show'));
window.addEventListener('appinstalled',()=>{document.getElementById('installBanner').classList.remove('show');showToast('✓ SOCRAM TV instalada');});
</script>
