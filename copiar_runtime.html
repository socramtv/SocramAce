<!DOCTYPE html>
<html>
<head>
  <title>Copiar Texto</title>
  <style>
    p {
      color: white;
    }
  </style>
</head>
<body>
  <p id="textoACopiar">https://raw.githubusercontent.com/HelmerLuzo/RuntimeTV_HL/refs/heads/main/tv/m3u/RuntimeTV_tv.m3u</p>
  
<p></p>
  <p></p>
  
<center><button onclick="copiarTexto()">Copiar</button></center>
<script>
    function copiarTexto() {
      var texto = document.getElementById("textoACopiar").textContent;
      navigator.clipboard.writeText(texto).then(() => {
        alert("Texto copiado");
      }).catch(err => {
        alert("Error al copiar: " + err);
      });
    }
</script>

</body>
</html>
