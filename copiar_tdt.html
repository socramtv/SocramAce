<!DOCTYPE html>
<html>
<head>
  <title>Copiar Texto</title>
</head>
<body>
  <p id="textoACopiar">https://www.tdtchannels.com/lists/tvradio_mpd.m3u8</p>
  <button onclick="copiarTexto()">Copiar</button>

  <script>
    function copiarTexto() {
      var texto = document.getElementById("textoACopiar").textContent;
      navigator.clipboard.writeText(texto).then(() => {
        alert("Texto copiado, ahora vuelves al apartado -Reproductor M3u- y pegalo");
      }).catch(err => {
        alert("Error al copiar: " + err);
      });
    }
  </script>


  <p id="texto-a-copiar">Toca sobre el boton copiar y vuelve al apartado "Reproductor M3u" y pega lo copiado donde indica la imagen.</p>

  <img src="https://socramtv.github.io/SocramAce/añadir_lista.jpg" alt="Descripción de la imagen">

</body>
</html>
